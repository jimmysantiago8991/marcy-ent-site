<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marcy Projects Entrepreneurs Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-card: #020617;
      --accent: #22c55e;
      --accent-glow: #a5b4fc;
      --text: #e5e7eb;
      --text-muted: #9ca3af;
      --border: #1f2937;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; }
    body { 
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      line-height: 1.7;
      overflow-x: hidden;
    }
    
    /* Header */
    header { 
      background: rgba(2, 6, 23, 0.95); 
      backdrop-filter: blur(10px);
      position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid var(--border);
    }
    nav { 
      max-width: 1200px; margin: 0 auto; padding: 1rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .logo { 
      font-size: 1.5rem; font-weight: 700; 
      background: linear-gradient(135deg, var(--accent), var(--accent-glow));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 2rem; list-style: none; padding: 0; }
    .nav-links a { 
      color: var(--text); text-decoration: none; 
      font-weight: 500; transition: all 0.3s ease;
      position: relative;
    }
    .nav-links a:hover { color: var(--accent); }
    .nav-links a[href*="420"] { color: var(--danger); }
    
    /* Hero Mission */
    .mission { 
      text-align: center; padding: 6rem 2rem 4rem; 
      position: relative; overflow: hidden;
    }
    .mission::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 400px; background: radial-gradient(circle at 30% 20%, rgba(34,197,94,0.1) 0%, transparent 50%);
      z-index: 1;
    }
    .mission-content { position: relative; z-index: 2; max-width: 800px; margin: 0 auto; }
    .mission h1 { 
      font-size: clamp(3rem, 8vw, 5rem); font-weight: 700; 
      margin-bottom: 2rem; letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent), var(--accent-glow));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .mission p { 
      font-size: 1.25rem; max-width: 700px; margin: 0 auto 1.5rem;
      opacity: 0.95;
    }
    .quote { 
      font-size: 1.4rem; font-style: italic; font-weight: 300;
      background: rgba(34,197,94,0.08); 
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 16px; padding: 2.5rem; margin: 3rem 0;
      box-shadow: 0 25px 50px -12px rgba(34,197,94,0.15);
    }
    
    /* Directory */
    .directory { padding: 6rem 2rem; }
    .directory h2 { 
      text-align: center; font-size: 2.5rem; margin-bottom: 4rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-glow));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .card-grid { 
      display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
      gap: 2rem; max-width: 1200px; margin: 0 auto;
    }
    .card { 
      background: var(--bg-card); border: 1px solid var(--border); 
      border-radius: 20px; padding: 2.5rem 2rem; 
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 4px; background: linear-gradient(90deg, var(--accent), var(--accent-glow));
      transform: scaleX(0); transition: transform 0.4s ease;
    }
    .card:hover { 
      transform: translateY(-12px) scale(1.02); 
      border-color: var(--accent); box-shadow: 0 35px 60px -15px rgba(0,0,0,0.4);
    }
    .card:hover::before { transform: scaleX(1); }
    .card h3 { 
      font-size: 1.5rem; margin-bottom: 1rem; color: var(--text);
    }
    .card p { color: var(--text-muted); margin-bottom: 1.5rem; }
    .card-links { display: flex; flex-wrap: wrap; gap: 1rem; }
    .card a { 
      padding: 0.75rem 1.5rem; background: rgba(34,197,94,0.1); 
      color: var(--accent); border: 1px solid rgba(34,197,94,0.3);
      border-radius: 50px; text-decoration: none; font-weight: 500;
      transition: all 0.3s ease;
    }
    .card a:hover { background: var(--accent); color: #022c22; transform: translateY(-2px); }
    
    .card.restricted { border-color: rgba(239,68,68,0.5); }
    .card.restricted::before { background: linear-gradient(90deg, var(--danger), #f87171); }
    .card.restricted a { 
      background: rgba(239,68,68,0.2); color: var(--danger); 
      border-color: rgba(239,68,68,0.4);
    }
    .card.restricted a:hover { background: var(--danger); color: white; }
    
    footer { 
      text-align: center; padding: 3rem 2rem; 
      background: var(--bg-card); color: var(--text-muted);
      border-top: 1px solid var(--border);
    }
    
    @media (max-width: 768px) {
      nav { flex-direction: column; gap: 1rem; padding: 1rem; }
      .mission { padding: 4rem 1rem; }
      .card-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
